<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="login-container">
      <h2>Sign In</h2>

      <!-- Visual only form -->
      <div class="input-group">
        <label>Email</label>
        <input type="email" placeholder="Enter your email" />
      </div>

      <div class="input-group">
        <label>Password</label>
        <div class="password-wrapper">
          <input
            type="password"
            id="password"
            placeholder="Enter your password"
          />
          <img src="images/eye.png" id="togglePassword" alt="Show Password" />
        </div>
      </div>

      <!-- Azure will hook into this -->
      <button id="loginBtn" class="login-btn">Sign in with Microsoft</button>

      <p class="footer-text">Authentication handled securely</p>
      <button
        onclick="window.location.href = 'schedule.html'"
        class="login-btn"
      >
        Bypass Login
      </button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
